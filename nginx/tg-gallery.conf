server {
    listen 80;
    server_name __HOST__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name __HOST__;

    ssl_certificate     __SSL_FULLCHAIN__;
    ssl_certificate_key __SSL_KEY__;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Telegram webhook → Node
    location __WEBHOOK_PATH__ {
        proxy_pass         http://127.0.0.1:__PORT__;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;
    }

    # Health check → Node
    location = /health {
        proxy_pass         http://127.0.0.1:__PORT__;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Static ZIP downloads — served straight from disk by nginx
    location /downloads/ {
        alias __DOWNLOADS_DIR__/;
        add_header Content-Disposition "attachment";
        autoindex off;

        # Hide sidecar metadata files (e.g. <name>.json) and any tmp uploads.
        location ~ /\. {
            deny all;
        }
        location ~ \.(json|tmp)$ {
            deny all;
        }
    }
}
